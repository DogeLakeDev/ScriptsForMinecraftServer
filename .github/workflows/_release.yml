name: Release

on:
  push:
    tags:
      - "v*" # 当推送 v1.0.0, v2.0.0 等 tag 时触发

jobs:
  build-and-release:
    runs-on: windows-latest # 生成 exe 需要 Windows，因为目标平台是 win-x64
    permissions:
      contents: write # 用于创建 Release 和上传附件
      id-token: write # 用于 npm 发布（如果需要 OIDC）

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          registry-url: "https://registry.npmjs.org"
          # 如果使用 npm 发布，需要设置 NODE_AUTH_TOKEN

      - name: Install dependencies (root)
        run: npm ci

      - name: Build all workspaces
        run: npm run build --workspaces # 如果配置了 workspaces，否则分别构建

      - name: Build panel bundle for SEA
        run: |
          node build-sea.mjs
        # 打包为 bundle

      - name: Create SEA config
        run: |
          echo '{ "main": "dist/sea/dispatcher.cjs" }' > sea-config.json

      - name: Generate exe via SEA
        run: |
          node --build-sea sea-config.json sfmc.exe

      - name: Prepare release package (zip)
        run: |
          mkdir release
          copy sfmc.exe release\
          copy node.exe release\   # 假设你已有一个 node.exe 或从某处获取
          xcopy /E /I db-server release\db-server
          xcopy /E /I qq-bridge release\qq-bridge
          xcopy /E /I configs release\configs
          # 创建 version.txt
          echo ${{ github.ref_name }} > release\version.txt
          # 打包 zip
          7z a bds-panel-${{ github.ref_name }}.zip ./release/*

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sfmc-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Publish to npm (optional)
        if: contains(github.ref, 'v') # 只在 tag 时发布
        run: |
          cd panel   # 如果是 monorepo 的子包，切换到该目录
          npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
